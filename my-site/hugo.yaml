          name: Blog
          title: Articles de blog
          url: /fr/blogs
          weight: 1
        - identifier: gallery
          name: Galerie
          title: Galerie d'images
          url: /fr/gallery
          weight: 2
    params:
      hero:
        intro: ""
        title: "Nilam Patil"
        subtitle: "Donnez a votre enfant les competences pour creer, construire et s'epanouir dans un monde guide par la technologie."
        content: |-
          Explorez avec moi des aventures d'apprentissage passionnantes en sciences, mathematiques, robotique, programmation et bien plus encore.

          Je suis une educatrice passionnee qui accompagne de jeunes apprenants du monde entier pour les aider a grandir avec confiance et creativite.

          Chaque apprenant est unique, et son apprentissage devrait l'etre aussi.

          Je propose des sessions personnalisees, guidees, en individuel et en petits groupes, en utilisant des outils et des technologies modernes pour rendre l'apprentissage captivant, concret et vraiment efficace.
        button:
          name: "CV"
      about:
        title: "A Propos de Moi"
        content: |-
          Je suis une educatrice internationale en robotique et en programmation avec six annees d'experience dans l'enseignement en ligne a des eleves ages de 6 a 18 ans aux Etats-Unis, en Australie, en Europe, en Asie et au Moyen-Orient.

          Mon expertise principale est le developpement de jeux Roblox avec Roblox Studio. J'enseigne la conception de jeux, la programmation Lua et la creation d'environnements 3D, en guidant les eleves pour qu'ils construisent leurs propres jeux tout en renforcant leurs competences en programmation et leur pensee creative. J'enseigne egalement la programmation par blocs (MIT Scratch, Code.org), la robotique avec Arduino et LEGO, les bases de l'IA, Minecraft Education et le developpement web (HTML, CSS et JavaScript).

          J'ai egalement de l'experience dans la creation de ressources pedagogiques structurees, notamment des plans de cours, des videos explicatives et des supports d'apprentissage par projets adaptes a differents groupes d'age. Je suis titulaire d'un master en physique avec une specialisation en electronique, ce qui m'aide a simplifier des concepts techniques complexes en experiences d'apprentissage engageantes et centrees sur l'apprenant.
        skills:
          title: "Eveillez la curiosite. Developpez les competences. Liberez le potentiel."
      achievements:
        title: "Impact Pedagogique"
        items:
          - title: "Portee Mondiale des Eleves"
            content: "J'ai accompagne avec succes plus de 500 eleves sur 5 continents : Etats-Unis, Australie, Europe, Asie et Moyen-Orient."
          - title: "Reussites des Eleves"
            content: "Plusieurs eleves ont gagne des concours de programmation et cree leurs premiers jeux publies sur la plateforme Roblox."
          - title: "Excellence en Conception de Programmes"
            content: "J'ai cree des parcours d'apprentissage complets pour MIT Scratch, Roblox Studio, Arduino et le developpement web, avec un taux d'achevement de 95 %."
            url: "https://github.com/nilampatil26"
          - title: "Experte en Developpement de Jeux Roblox"
            content: "J'ai guide plus de 50 eleves pour creer et publier leurs propres jeux sur Roblox, en enseignant la programmation Lua et la conception d'environnements 3D."
          - title: "Actrice de l'Education STEM"
            content: "J'ai collabore avec des plateformes edtech internationales pour proposer une education STEM de qualite a des apprenants de 6 a 18 ans."
      projects:
        title: "Cours"
      contact:
        title: "Contactez-Moi"
        content: "Ma boite de reception est toujours ouverte. Que vous ayez une question ou souhaitiez simplement dire bonjour, je ferai de mon mieux pour vous repondre."
        btnName: "Ecrivez-moi"
      footer:
        recentPosts:
          title: "Articles Recents"

