    params:
      hero:
        intro: ""
        title: "Nilam Patil"
        subtitle: "Dale a tu hijo las habilidades para crear, construir y prosperar en un mundo impulsado por la tecnología."
        content: |-
          Sumérgete conmigo en emocionantes aventuras de aprendizaje en ciencias, matemáticas, robótica, programación y mucho más.

          Soy una educadora apasionada que acompaña a jóvenes estudiantes de todo el mundo, ayudándolos a crecer con confianza y creatividad.

          Cada estudiante es único, y su aprendizaje también debería serlo.

          Ofrezco sesiones personalizadas, guiadas, individuales y en grupos pequeños, utilizando herramientas y tecnología modernas para que el aprendizaje sea atractivo, práctico y realmente efectivo.
        button:
          name: "Currículum"
      about:
        title: "Sobre Mí"
        content: |-
          Soy una educadora internacional de robótica y programación con seis años de experiencia impartiendo clases en línea a estudiantes de 6 a 18 años en Estados Unidos, Australia, Europa, Asia y Medio Oriente.

          Mi especialidad principal es el desarrollo de videojuegos en Roblox con Roblox Studio. Enseño diseño de juegos, programación en Lua y creación de entornos 3D, guiando a los estudiantes para que construyan sus propios juegos mientras fortalecen sus habilidades de programación y pensamiento creativo. Además, enseño programación por bloques (MIT Scratch, Code.org), robótica con Arduino y LEGO, fundamentos de IA, Minecraft Education y desarrollo web (HTML, CSS y JavaScript).

          También tengo experiencia en el desarrollo de recursos curriculares estructurados, incluidos planes de lecciones, videos instructivos y materiales de aprendizaje basados en proyectos adaptados a diversos grupos de edad. Tengo una Maestría en Física con especialización en Electrónica, lo que me ayuda a simplificar conceptos técnicos complejos en experiencias de aprendizaje atractivas y centradas en el estudiante.
        skills:
          title: "Despierta la curiosidad. Desarrolla habilidades. Desbloquea el potencial."
      achievements:
        title: "Impacto Educativo"
        items:
          - title: "Alcance Global de Estudiantes"
            content: "He enseñado con éxito a más de 500 estudiantes en 5 continentes: Estados Unidos, Australia, Europa, Asia y Medio Oriente."
          - title: "Historias de Éxito"
            content: "Varios estudiantes han ganado competencias de programación y creado sus primeros juegos publicados en la plataforma Roblox."
          - title: "Excelencia en Desarrollo Curricular"
            content: "Creé rutas de aprendizaje integrales para MIT Scratch, Roblox Studio, Arduino y desarrollo web, con una tasa de finalización estudiantil del 95%."
            url: "https://github.com/nilampatil26"
          - title: "Experta en Desarrollo de Juegos en Roblox"
            content: "He guiado a más de 50 estudiantes para crear y publicar sus propios juegos en Roblox, enseñando programación en Lua y diseño de entornos 3D."
          - title: "Impulsora de la Educación STEM"
            content: "He colaborado con plataformas internacionales de tecnología educativa para ofrecer educación STEM de calidad a estudiantes diversos de 6 a 18 años."
      projects:
        title: "Cursos"
      contact:
        title: "Contáctame"
        content: "Mi bandeja de entrada siempre está abierta. Ya sea que tengas una pregunta o simplemente quieras saludar, haré todo lo posible por responderte."
        btnName: "Escríbeme"
      footer:
        recentPosts:
          title: "Publicaciones Recientes"
  fr:
    languageName: "Français"
    weight: 3
    contentDir: "content/fr"
    menu:
