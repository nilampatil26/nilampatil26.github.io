<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="robotBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#95a5a6"/>
      <stop offset="50%" style="stop-color:#7f8c8d"/>
      <stop offset="100%" style="stop-color:#5d6d7e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#robotBg)"/>
  
  <!-- Circuit board pattern -->
  <g stroke="#27ae60" stroke-width="1" fill="none" opacity="0.3">
    <path d="M0 100 H600"/>
    <path d="M0 200 H600"/>
    <path d="M0 300 H600"/>
    <path d="M100 0 V400"/>
    <path d="M300 0 V400"/>
    <path d="M500 0 V400"/>
  </g>
  
  <!-- LEGO bricks background -->
  <g opacity="0.15">
    <rect x="50" y="50" width="60" height="30" rx="2" fill="#e74c3c"/>
    <rect x="55" y="45" width="12" height="8" rx="1" fill="#c0392b"/>
    <rect x="73" y="45" width="12" height="8" rx="1" fill="#c0392b"/>
    <rect x="91" y="45" width="12" height="8" rx="1" fill="#c0392b"/>
    
    <rect x="120" y="80" width="60" height="30" rx="2" fill="#3498db"/>
    <rect x="125" y="75" width="12" height="8" rx="1" fill="#2980b9"/>
    <rect x="143" y="75" width="12" height="8" rx="1" fill="#2980b9"/>
    <rect x="161" y="75" width="12" height="8" rx="1" fill="#2980b9"/>
  </g>
  
  <!-- Robot Body -->
  <rect x="200" y="150" width="200" height="160" rx="15" fill="url(#metal)"/>
  <rect x="210" y="160" width="180" height="140" rx="10" fill="#2c3e50"/>
  
  <!-- Robot Screen/Face -->
  <rect x="230" y="175" width="140" height="80" rx="5" fill="#000"/>
  <circle cx="270" cy="215" r="20" fill="#00ff00" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="330" cy="215" r="20" fill="#00ff00" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Robot Antenna -->
  <line x1="300" y1="150" x2="300" y2="100" stroke="#95a5a6" stroke-width="4"/>
  <circle cx="300" cy="95" r="8" fill="#e74c3c">
    <animate attributeName="fill" values="#e74c3c;#ff6b6b;#e74c3c" dur="1s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Arduino Board -->
  <rect x="430" y="250" width="140" height="90" rx="3" fill="#27ae60"/>
  <rect x="440" y="260" width="120" height="70" rx="2" fill="#1e8449"/>
  <rect x="450" y="270" width="15" height="15" fill="#f39c12"/>
  <rect x="475" y="270" width="15" height="15" fill="#f39c12"/>
  <rect x="500" y="270" width="15" height="15" fill="#f39c12"/>
  <rect x="525" y="270" width="15" height="15" fill="#f39c12"/>
  <text x="500" y="310" text-anchor="middle" fill="#fff" font-size="10" font-family="monospace">ARDUINO</text>
  
  <!-- LEGO Brick Stack Left -->
  <g transform="translate(80, 220)">
    <rect x="0" y="40" width="50" height="25" rx="2" fill="#e67e22"/>
    <rect x="5" y="35" width="10" height="8" rx="1" fill="#d35400"/>
    <rect x="20" y="35" width="10" height="8" rx="1" fill="#d35400"/>
    <rect x="35" y="35" width="10" height="8" rx="1" fill="#d35400"/>
    
    <rect x="5" y="15" width="50" height="25" rx="2" fill="#3498db"/>
    <rect x="10" y="10" width="10" height="8" rx="1" fill="#2980b9"/>
    <rect x="25" y="10" width="10" height="8" rx="1" fill="#2980b9"/>
    <rect x="40" y="10" width="10" height="8" rx="1" fill="#2980b9"/>
    
    <rect x="0" y="-10" width="50" height="25" rx="2" fill="#e74c3c"/>
    <rect x="5" y="-15" width="10" height="8" rx="1" fill="#c0392b"/>
    <rect x="20" y="-15" width="10" height="8" rx="1" fill="#c0392b"/>
    <rect x="35" y="-15" width="10" height="8" rx="1" fill="#c0392b"/>
  </g>
  
  <!-- Gears -->
  <g transform="translate(100, 100)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#f39c12" stroke-width="3"/>
    <path d="M0 -35 L0 -25 M0 25 L0 35 M-35 0 L-25 0 M25 0 L35 0 M-25 -25 L-18 -18 M25 25 L18 18 M-25 25 L-18 18 M25 -25 L18 -18" stroke="#f39c12" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="10" fill="#f39c12"/>
  </g>
  
  <!-- Connection wires -->
  <path d="M430 280 Q350 280 330 280" stroke="#e74c3c" stroke-width="3" fill="none"/>
  <path d="M430 300 Q350 300 330 300" stroke="#3498db" stroke-width="3" fill="none"/>
  <path d="M430 320 Q350 320 330 320" stroke="#27ae60" stroke-width="3" fill="none"/>
  
  <!-- Title -->
  <text x="300" y="50" text-anchor="middle" fill="#fff" font-size="28" font-weight="bold" font-family="Arial, sans-serif">Arduino & LEGO Robotics</text>
  <text x="300" y="380" text-anchor="middle" fill="#27ae60" font-size="16" font-family="Arial, sans-serif">Build • Code • Create</text>
  
  <!-- Tech badges -->
  <g transform="translate(30, 350)">
    <rect x="0" y="0" width="50" height="20" rx="10" fill="#27ae60" opacity="0.8"/>
    <text x="25" y="14" text-anchor="middle" fill="#fff" font-size="9">Arduino</text>
  </g>
  <g transform="translate(90, 350)">
    <rect x="0" y="0" width="50" height="20" rx="10" fill="#e74c3c" opacity="0.8"/>
    <text x="25" y="14" text-anchor="middle" fill="#fff" font-size="9">LEGO</text>
  </g>
  <g transform="translate(520, 350)">
    <rect x="0" y="0" width="50" height="20" rx="10" fill="#3498db" opacity="0.8"/>
    <text x="25" y="14" text-anchor="middle" fill="#fff" font-size="9">Robotics</text>
  </g>
</svg>
