baseURL: "http://localhost:1315"
languageCode: "en-us"
title: "Hugo Profile Demo"
theme: hugo-profile

params:
  title: "Hugo Profile"
  description: "A highly customizable and mobile first Hugo template for personal portfolio and blog"
  staticPath: ""
  favicon: "/fav.png"

  # theme
  defaultTheme: "light"
  disableThemeToggle: false

  # profile
  avatar: "/images/me.png"
  
  # social links
  social:
    github: "https://github.com/gurusabarish"
    twitter: "https://twitter.com/gurusabarish"
    instagram: "https://instagram.com/gurusabarish"
    linkedin: "https://linkedin.com/in/gurusabarish"

  # home page
  hero:
    enable: true
    intro: "Hello, my name is"
    title: "John Doe"
    subtitle: "I build things for the web"
    content: |-
      I'm a passionate web developer with experience in creating beautiful and functional websites. 
      I love working with modern web technologies to build amazing user experiences.
    image: "/images/hero.svg"
    button:
      enable: true
      name: "Resume"
      url: "#"
      download: true
      newPage: false

  # about section
  about:
    enable: true
    title: "About Me"
    content: |-
      I'm a software developer with a passion for web development. I have experience in computer science and mathematics, 
      and have a strong interest in the intersection of technology and art. I'm currently working as a software developer 
      at [Example Org](https://example.com) in San Francisco, CA.
      
      I'm currently working on a project that will be used to help people find the best way to get around the city.
    image: "/images/me.png"
    skills:
      enable: true
      title: "Here are some technologies I've been working with recently:"
      items:
        - "JavaScript"
        - "React"
        - "Node.js"
        - "Python"
        - "Docker"
        - "AWS"

  # experience section
  experience:
    enable: true
    title: "Experience"
    items:
      - job: "Senior Software Developer"
        company: "Facebook"
        companyUrl: "https://example.com"
        date: "Jan 2022 - present"
        content: |-
          I'm currently working as a software developer at [Example Org](https://example.com) in San Francisco, CA. 
          I'm working on a project that will be used to help people find the best way to get around the city.
        featuredLink:
          enable: true
          name: "View the project"
          url: "https://example.com"

  # education section
  education:
    enable: true
    title: "Education"
    items:
      - title: "Master of Business Administration"
        school:
          name: "University of California, Berkeley"
          url: "https://example.org"
        date: "2013 - 2015"
        GPA: "3.8 out of 5.0"
        content: |-
          Extracurricular Activities
            - Lorem ipsum dolor sit amet consectetur adipisicing elit.
            - Tempora esse, eaque delectus nulla quo doloribus itaque expedita alias natus optio totam maxime nihil excepturi velit a animi laborum hic similique.

  # projects section
  projects:
    enable: true
    title: "Projects"
    items:
      - title: "Hugo Profile"
        content: "A highly customizable and mobile first Hugo template for personal portfolio and blog."
        image: "/images/projects/profile.png"
        featured:
          name: "Demo"
          link: "https://hugo-profile.netlify.app"
        badges:
          - "Hugo"
          - "Bootstrap"
          - "JavaScript"
        links:
          - icon: "fab fa-github"
            url: "https://github.com/gurusabarish/hugo-profile"

  # achievements section
  achievements:
    enable: true
    title: "Achievements"
    items:
      - title: "Google Kickstart Runner"
        content: "I solved all problems with optimal solution."
        url: "https://example.com"

  # contact section
  contact:
    enable: true
    title: "Contact Me"
    content: "My inbox is always open. Whether you have a question or just want to say hi, I'll try my best to get back to you!"
    email: "example@example.com"
    phone: "+1234567890"
    btnName: "Mail me"

# menu configuration
menu:
  main:
    - identifier: "blog"
      name: "Blog"
      title: "Blog posts"
      url: "/blogs"
      weight: 1
    - identifier: "gallery"
      name: "Gallery"
      title: "Gallery"
      url: "/gallery"
      weight: 2
